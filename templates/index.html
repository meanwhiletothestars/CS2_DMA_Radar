<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Viewer</title>
    <style>
        #map {
            width: 600px;
            height: 400px;
            background-image: url('/path/to/your/map/image.png');
            position: relative;
        }
        .player {
            width: 10px;
            height: 10px;
            position: absolute;
            border-radius: 50%;
            text-align: center;
            color: white;
            font-size: 10px;
            line-height: 10px;
        }
        .red { background-color: red; }
        .blue { background-color: blue; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="players"></div>

<script>
async function fetchAndDisplayPlayers() {
    const playersContainer = document.getElementById('players');
    try {
        const response = await fetch('/players');
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        const players = await response.json();
        
        playersContainer.innerHTML = '';
        
        players.forEach(player => {
            const playerElement = document.createElement('div');
            playerElement.innerHTML = `ID: ${player.entity_id}, HP: ${player.hp}, Team: ${player.team}, Position: (${player.position.x.toFixed(2)}, ${player.position.y.toFixed(2)}, ${player.position.z.toFixed(2)})`;
            playersContainer.appendChild(playerElement);
        });
    } catch (error) {
        console.error('Failed to fetch players:', error);
        playersContainer.innerHTML = '<p>Error loading players.</p>';
    }
}

document.addEventListener('DOMContentLoaded', fetchAndDisplayPlayers);

setInterval(fetchAndDisplayPlayers, 50);
</script>

</body>
</html>
